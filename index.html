<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CHATTER.CALC</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --accent: #f5c518;
    --bg: #fafafa;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #777;
    --line: #e0e0e0;
  }
  html, body {
    background: var(--bg); color: var(--text);
    font-family: 'Helvetica Neue', 'Arial Narrow', sans-serif;
    font-stretch: condensed;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  body { padding: 10px 16px 10px; max-width: 480px; margin: 0 auto; }

  .section-label {
    font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
    color: var(--muted); margin-bottom: 6px; text-transform: uppercase;
  }
  .section-label.outputs { color: var(--text); font-size: 13px; font-weight: 900; letter-spacing: 0.5px; }
  .divider { height: 2px; background: var(--accent); margin-bottom: 12px; }

  .op-tabs {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    background: #ececec; border-radius: 4px; padding: 3px;
    margin-bottom: 12px; gap: 2px;
  }
  .op-tab {
    padding: 9px 6px; text-align: center;
    font-size: 12px; font-weight: 800; letter-spacing: 1px;
    color: var(--muted); background: transparent; border: none;
    border-radius: 3px; cursor: pointer; transition: all 0.2s ease;
    font-family: inherit;
  }
  .op-tab.active { background: var(--accent); color: #000; }

  .mode-tabs { display: grid; grid-template-columns: 1fr 1fr; margin-bottom: 10px; }
  .mode-tab {
    padding: 10px; text-align: center;
    font-size: 13px; font-weight: 800; letter-spacing: 1.5px;
    color: var(--muted); background: transparent; border: none;
    cursor: pointer; font-family: inherit;
  }
  .mode-tab.active { background: var(--accent); color: #000; }

  .field-group { margin-bottom: 10px; }
  .field-group.dimmed { opacity: 0.15; pointer-events: none; }

  .field-label-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 4px;
    min-height: 18px;
  }
  .field-label {
    font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
    color: var(--muted); text-transform: uppercase;
  }

  .unit-toggle {
    display: inline-flex; background: #ececec; border-radius: 3px;
    padding: 2px; font-size: 10px; font-weight: 800; cursor: pointer;
    user-select: none;
  }
  .unit-toggle span {
    padding: 3px 8px; border-radius: 2px; color: var(--muted);
    transition: all 0.15s ease;
  }
  .unit-toggle span.on { background: var(--accent); color: #000; }

  .input-box {
    background: var(--card); border: 1px solid var(--line); border-radius: 4px;
    padding: 12px 14px; width: 100%; color: var(--text);
    font-size: 22px; font-weight: 700; font-family: inherit; text-align: center;
    transition: border-color 0.15s ease;
  }
  .input-box:focus { outline: none; border-color: var(--accent); }

  .pair { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field-group.ghost .field-label-row { visibility: hidden; }
  .field-group.ghost .input-box {
    background: #eaeaea;
    color: #eaeaea;
    pointer-events: none;
    border: 1px solid #d8d8d8;
  }

  .outputs-divider { height: 1px; background: var(--line); margin: 10px 0 8px; }

  .output-row {
    display: grid; grid-template-columns: 50px 1fr auto;
    align-items: center; background: var(--card);
    padding: 10px 12px; border-radius: 4px;
    border: 1px solid var(--line);
    border-left: 3px solid; margin-bottom: 6px; gap: 10px;
  }
  .output-row.n { border-left-color: var(--accent); }
  .output-row.vf { border-left-color: #4ab3f0; }

  .badge { font-size: 24px; font-weight: 900; font-style: italic; }
  .badge.n { color: var(--accent); }
  .badge.vf { color: #4ab3f0; }

  .output-label {
    font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
    color: var(--muted); text-transform: uppercase;
  }
  .output-value { text-align: right; }
  .output-value .main { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; }
  .output-value .unit { font-size: 10px; color: var(--muted); font-weight: 700; margin-left: 4px; }
  .output-value .sub { font-size: 10px; color: var(--muted); margin-top: 1px; }
